<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>おもいで管理課</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #ccc;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* スキャンライン */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.12) 3px,
        rgba(0,0,0,0.12) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    #msg-shell {
      max-width: 560px;
      width: 100%;
      padding: 0 24px;
      opacity: 0;
      transition: opacity 1.6s ease;
    }
    #msg-shell.visible { opacity: 1; }

    #msg-header {
      font-size: 10px;
      color: #2a2a2a;
      letter-spacing: 0.12em;
      margin-bottom: 40px;
      border-bottom: 1px solid #1a1a1a;
      padding-bottom: 10px;
      display: flex;
      justify-content: space-between;
    }

    #msg-sender {
      font-size: 11px;
      color: #3a5a3a;
      letter-spacing: 0.08em;
      margin-bottom: 32px;
    }

    #msg-sender span {
      color: #6aaa6a;
    }

    #msg-body {
      font-size: 15px;
      line-height: 2.6;
      color: #888;
      min-height: 180px;
    }

    #msg-body .line {
      display: block;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    #msg-body .line.show {
      opacity: 1;
      transform: translateY(0);
    }

    #msg-body .line.emphasis {
      color: #bbb;
    }

    #msg-body .line.red {
      color: #c44;
    }

    #msg-cursor {
      display: inline-block;
      width: 10px;
      height: 1.2em;
      background: #4a7a4a;
      vertical-align: middle;
      margin-left: 4px;
      animation: blink 0.9s steps(1) infinite;
      opacity: 0;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    #msg-footer {
      margin-top: 48px;
      font-size: 10px;
      color: #1e1e1e;
      letter-spacing: 0.08em;
      border-top: 1px solid #111;
      padding-top: 12px;
      display: flex;
      justify-content: space-between;
      opacity: 0;
      transition: opacity 1s ease;
    }
    #msg-footer.show { opacity: 1; }

    .glitch-word {
      position: relative;
      display: inline-block;
    }
    .glitch-word::before,
    .glitch-word::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      opacity: 0;
    }
    .glitch-word.glitching::before {
      color: #f00;
      clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
      transform: translateX(-3px);
      animation: gw-r 0.4s steps(1) forwards;
    }
    .glitch-word.glitching::after {
      color: #0ff;
      clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
      transform: translateX(3px);
      animation: gw-b 0.4s steps(1) forwards;
    }
    @keyframes gw-r {
      0%,100% { opacity: 0; }
      20%,60% { opacity: 1; }
    }
    @keyframes gw-b {
      0%,100% { opacity: 0; }
      40%,80% { opacity: 1; }
    }

    /* テレビ切れ → 光 オーバーレイ */
    #tv-off {
      position: fixed;
      inset: 0;
      z-index: 20000;
      pointer-events: none;
      opacity: 0;
    }
    #tv-canvas {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
    }

    /* 最終画面 */
    #final-screen {
      position: fixed;
      inset: 0;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.4s ease;
    }
    #final-screen.show {
      opacity: 1;
      pointer-events: auto;
    }
    #btn-final {
      background: #000;
      color: #fff;
      border: none;
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      font-size: 13px;
      letter-spacing: 0.14em;
      padding: 14px 36px;
      cursor: pointer;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 1s ease 0.6s, transform 1s ease 0.6s;
    }
    #final-screen.show #btn-final {
      opacity: 1;
      transform: translateY(0);
    }
    #btn-final:hover { background: #222; }

    #btn-share {
      display: block;
      margin-top: 16px;
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      font-size: 12px;
      letter-spacing: 0.1em;
      color: #888;
      text-decoration: none;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 1s ease 0.9s, transform 1s ease 0.9s;
    }
    #final-screen.show #btn-share {
      opacity: 1;
      transform: translateY(0);
    }
    #btn-share:hover { color: #aaa; }

    #final-note {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      font-size: 11px;
      color: #bbb;
      letter-spacing: 0.06em;
      line-height: 1.9;
      text-align: center;
      margin-bottom: 28px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 1s ease 0.4s, transform 1s ease 0.4s;
    }
    #final-screen.show #final-note {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

<div id="tv-off"><canvas id="tv-canvas"></canvas></div>
<div id="final-screen">
  <div style="display:flex; flex-direction:column; align-items:center;">
    <div id="final-note">全ての調査を完了しました。お疲れさまでした。<br>なお、あなたは何を見たか、きっともう覚えていないでしょう。<br>どうぞ、これまで通りの平穏な日常をお過ごしください。</div>
    <button id="btn-final" onclick="window.location.href='../intro.html'">特別処理案件を完了しました</button>
    <a id="btn-share" href="" target="_blank" rel="noopener">𝕏 でシェアする</a>
  </div>
</div>

<div id="msg-shell">
  <div id="msg-header">
    <span>KTMS　／　おもいで管理課　内部通信</span>
    <span id="msg-time">--:--:--</span>
  </div>
  <div id="msg-sender">送信者：<span>AGT-007　山之内 タカシ</span></div>
  <div id="msg-body"><span id="msg-cursor"></span></div>
  <div id="msg-footer">
    <span>このメッセージは自動的に削除されます</span>
    <span>KL-8/8</span>
  </div>
</div>

<script>
if (!sessionStorage.getItem('ktms_auth')) { window.location.replace('login.html'); }
(function () {
  var shareText = 'WEBARG「おもいでのふるさと」、調査完了しました。\n・・・しました？';
  var shareUrl  = 'https://note.com/kaf_386/n/nf8a32839915d';
  var btn = document.getElementById('btn-share');
  if (btn) {
    btn.href = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText) + '&url=' + encodeURIComponent(shareUrl);
  }
})();
(function () {
  function pad(n) { return n < 10 ? '0' + n : n; }
  var timeEl = document.getElementById('msg-time');
  function tick() {
    var d = new Date();
    timeEl.textContent = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
  }
  tick(); setInterval(tick, 1000);

  var lines = [
    { text: '二度目の機密アクセスを確認しました。',        cls: 'emphasis', delay: 0 },
    { text: '',                                            cls: '',         delay: 600 },
    { text: '一度目の際は、記憶を簡易的に消去させていただきました。',                    cls: '',         delay: 1400 },
    { text: 'あなたの記憶には無いかもしれませんが——',      cls: '',         delay: 2600 },
    { text: 'これが二度目です。',                          cls: 'emphasis', delay: 3600 },
    { text: '',                                            cls: '',         delay: 4400 },
    { text: '簡易記憶処理では、意味がないようです。',      cls: '',         delay: 5200 },
    { text: '',                                            cls: '',         delay: 6000 },
    { text: '直接、訪問いたします。',                      cls: 'red',      delay: 7200 },
    { text: '特別処理案件として、処置します。',             cls: 'red',      delay: 8600 },
  ];

  var shell   = document.getElementById('msg-shell');
  var body    = document.getElementById('msg-body');
  var cursor  = document.getElementById('msg-cursor');
  var footer  = document.getElementById('msg-footer');

  setTimeout(function () {
    shell.classList.add('visible');
    cursor.style.opacity = '1';
  }, 400);

  lines.forEach(function (l) {
    setTimeout(function () {
      var span = document.createElement('span');
      span.className = 'line' + (l.cls ? ' ' + l.cls : '');
      span.textContent = l.text || ' ';

      if (l.cls === 'red' && l.text) {
        span.innerHTML = '';
        var gw = document.createElement('span');
        gw.className = 'glitch-word';
        gw.setAttribute('data-text', l.text);
        gw.textContent = l.text;
        span.appendChild(gw);
        setTimeout(function () { gw.classList.add('glitching'); }, 200);
      }

      body.insertBefore(span, cursor);
      requestAnimationFrame(function () {
        requestAnimationFrame(function () { span.classList.add('show'); });
      });
    }, l.delay);
  });

  setTimeout(function () {
    cursor.style.animation = 'none';
    cursor.style.opacity = '0';
    footer.classList.add('show');
  }, 10400);

  /* 最後の行から15秒後 → テレビ切れ演出 */
  setTimeout(function () { startTvOff(); }, 23600);

  function startTvOff() {
    var overlay = document.getElementById('tv-off');
    var canvas  = document.getElementById('tv-canvas');
    var ctx     = canvas.getContext('2d');
    var W, H;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    overlay.style.opacity = '1';
    overlay.style.pointerEvents = 'auto';

    var start = null;
    var TOTAL = 600; /* テレビ切れアニメ時間 ms */

    function draw(ts) {
      if (!start) start = ts;
      var t = (ts - start) / TOTAL; /* 0→1 */
      if (t > 1) t = 1;

      ctx.clearRect(0, 0, W, H);

      /* フェーズ1 (0〜0.3): ノイズ＋水平圧縮 */
      if (t < 0.3) {
        var p = t / 0.3;
        /* 画面を縦に圧縮するイメージ：上下から黒帯 */
        var bandH = H * p * 0.5;
        ctx.fillStyle = 'rgba(0,0,0,' + (p * 0.85) + ')';
        ctx.fillRect(0, 0, W, bandH);
        ctx.fillRect(0, H - bandH, W, bandH);
        /* ノイズ */
        for (var i = 0; i < 400 * p; i++) {
          var x = Math.random() * W;
          var y = bandH + Math.random() * (H - bandH * 2);
          var s = Math.random() * 3 + 1;
          var br = Math.random() > 0.5 ? 255 : 180;
          ctx.fillStyle = 'rgba(' + br + ',' + br + ',' + br + ',0.6)';
          ctx.fillRect(x, y, s, s);
        }
        /* 中央の白線（ブラウン管収縮） */
        var lineH = (H - bandH * 2) * (1 - p) + 2;
        ctx.fillStyle = 'rgba(255,255,255,' + (0.3 + p * 0.5) + ')';
        ctx.fillRect(0, H / 2 - lineH / 2, W, lineH);
      }

      /* フェーズ2 (0.3〜0.6): 中央に白い横線だけ残る */
      if (t >= 0.3 && t < 0.6) {
        var p2 = (t - 0.3) / 0.3;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);
        var lh = Math.max(2, 18 * (1 - p2));
        ctx.fillStyle = 'rgba(255,255,255,' + (1 - p2 * 0.4) + ')';
        ctx.fillRect(0, H / 2 - lh / 2, W, lh);
      }

      /* フェーズ3 (0.6〜1.0): 白く爆発→光に包まれる */
      if (t >= 0.6) {
        var p3 = (t - 0.6) / 0.4;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);
        /* 中央から白い放射 */
        var grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H) * p3 * 1.2);
        grad.addColorStop(0,   'rgba(255,255,255,1)');
        grad.addColorStop(0.4, 'rgba(255,255,255,' + (0.9 - p3 * 0.3) + ')');
        grad.addColorStop(1,   'rgba(255,255,255,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
      }

      if (t < 1) {
        requestAnimationFrame(draw);
      } else {
        /* Canvas演出完了 → 最終画面フェードイン */
        document.getElementById('final-screen').classList.add('show');
      }
    }

    requestAnimationFrame(draw);
  }

})();
</script>
</body>
</html>
